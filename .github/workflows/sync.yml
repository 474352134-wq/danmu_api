name: sync to Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 完整历史，避免 shallow update 错误

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.hf_token }}
          SPACE_NAME: ${{ vars.hf_space_name }}   # 变量名与你仓库一致
          USERNAME: ${{ vars.hf_username }}       # 变量名与你仓库一致
        run: |
          git config --global user.email "gh-actions@example.com"
          git config --global user.name "GitHub Actions"
          git remote add space https://${USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${USERNAME}/${SPACE_NAME}
          git push space main --force
